    <form>

    <img src="images/logoexpobox.png" alt="Logo ExpoBox" width="10%" >

    <h1 align="center"> GESTION DES EQUIPEMENTS </h1>
    
    
    <table border="0" cellpadding="2">
        <tr>
          <th> Nom équipement*</th>
          <td><input type="text" name="Nom équipement" size="20"></td>
        </tr>

        <tr>
          <th> Désignation équipement*</th>
          <td><input type="text" name="Désignation équipement" size="20"></td>
        </tr>

        <tr>
          <th> Quantité </th>
          <td><input type="text" name="Quantité" size="20"></td>
        </tr>

        <tr>
          <th> Coût/ Jour*</th>
          <td><input type="text" name="Coût/ Jour" size="20"></td>
        </tr>
    </table>


    <div class="bouton_radio">
        <legend> Type d'équipement</legend>

        <input type="radio" name="type_equipement" value="Numérique">
        <label> Numérique</label>

        <input type="radio" name="type_equipement" value="Mobilier">
        <label> Mobilier</label>

        <input type="radio" name="type_equipement" value="Décoration">
        <label> Décoration</label>
    </div>
    
    
    <div class="bouton">
        <button class="bouton_orange">RECHERCHER</button>
        <button class="bouton_orange">AJOUTER</button>
        <button class="bouton_orange">MODIFIER</button>
        <button class="bouton_orange">SUPPRIMER</button>

    <p class="champ_obligatoire"> *Champs obligatoire</p>
